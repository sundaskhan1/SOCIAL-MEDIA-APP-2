name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}  
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Git commit SHA for tag
        id: vars
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build -t sundaskhan2/demo_nodejs_webpage:${{ steps.vars.outputs.TAG }} ./SOCIAL-MEDIA-APP-2

      - name: Push Docker image
        run: |
          docker push sundaskhan2/demo_nodejs_webpage:${{ steps.vars.outputs.TAG }}

      - name: Tag and push latest
        run: |
          docker tag sundaskhan2/demo_nodejs_webpage:${{ steps.vars.outputs.TAG }} sundaskhan2/demo_nodejs_webpage:latest
          docker push sundaskhan2/demo_nodejs_webpage:latest